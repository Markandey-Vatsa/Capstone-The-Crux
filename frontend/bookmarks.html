<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmarks - The Crux</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="favicon.svg">
    <!-- Modular CSS Files -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/articles.css?v=20250919.1">
    <link rel="stylesheet" href="css/modals.css?v=20250919">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/bias-analysis.css">
    <link rel="stylesheet" href="css/profile-bookmarks.css?v=20250919">
    <link rel="stylesheet" href="css/style.css?v=20250919"><!-- global overrides -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Navigation Bar -->
        <header class="nav-header">
            <div class="nav-content">
                <div class="nav-brand">
                    <div class="brand-icon">
                        <i class="fas fa-newspaper"></i>
                    </div>
                    <h1>The Crux</h1>
                </div>
                <nav class="nav-menu">
                    <a href="index.html" class="nav-link">
                        <i class="fas fa-home"></i>
                        <span>News</span>
                    </a>
                    <a href="profile.html" class="nav-link">
                        <i class="fas fa-user"></i>
                        <span>Profile</span>
                    </a>
                    <a href="bookmarks.html" class="nav-link active">
                        <i class="fas fa-bookmark"></i>
                        <span>Bookmarks</span>
                    </a>
                    <a href="reading-lists.html" class="nav-link">
                        <i class="fas fa-list"></i>
                        <span>Reading Lists</span>
                    </a>
                    <button id="logoutBtn" class="nav-link logout-btn">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </button>
                </nav>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="bookmarks-container">
                <!-- Bookmarks Header -->
                <div class="bookmarks-header glass-card">
                    <div class="header-content">
                        <div class="header-info">
                            <h2><i class="fas fa-bookmark"></i> My Bookmarks</h2>
                            <p id="bookmarkStats">Loading saved articles...</p>
                        </div>
                        <div class="header-actions">
                            <button id="refreshBtn" class="btn btn-secondary">
                                <i class="fas fa-sync-alt"></i>
                                Refresh
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Bookmarks List -->
                <div class="bookmarks-content">
                    <div id="bookmarksList" class="articles-grid"><!-- shares styling with news feed -->
                        <!-- Bookmarked articles will be loaded here -->
                    </div>

                    <!-- Empty State -->
                    <div id="emptyState" class="empty-state glass-card" style="display: none;">
                        <div class="empty-icon">
                            <i class="fas fa-bookmark"></i>
                        </div>
                        <h3>No Bookmarks Yet</h3>
                        <p>Start bookmarking articles to see them here</p>
                        <a href="index.html" class="btn btn-primary">
                            <i class="fas fa-newspaper"></i>
                            Browse News
                        </a>
                    </div>
                </div>
            </div>
        </main>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Loading bookmarks...</p>
            </div>
        </div>

        <!-- Article Modal -->
        <div id="articleModal" class="modal-overlay" style="display: none;">
            <div class="modal glass-card article-modal">
                <div class="modal-header">
                    <h3 id="modalTitle">Article Details</h3>
                    <button class="close-btn" onclick="closeArticleModal()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div id="modalContent">
                        <!-- Article content will be loaded here -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="modalBookmarkBtn" class="btn btn-secondary">
                        <i class="fas fa-bookmark"></i>
                        Remove Bookmark
                    </button>
                    <button id="modalBiasBtn" class="btn btn-primary">
                        <i class="fas fa-chart-line"></i>
                        Analyze Bias
                    </button>
                    <button class="btn btn-secondary" onclick="closeArticleModal()">Close</button>
                </div>
            </div>
        </div>

        <!-- Unified Bias Analysis Modal (matches dashboard/index.html) -->
        <div class="modal" id="bias-analysis-modal">
            <div class="modal-content bias-modal-container">
                <div class="modal-header">
                    <h2>AI Bias Analysis</h2>
                    <button class="modal-close" id="bias-modal-close-btn" onclick="closeBiasModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <div id="bias-analysis-loading" class="loading">
                        <div class="spinner"></div>
                        <p>Analyzing article for bias...</p>
                    </div>
                    <div id="bias-analysis-content" class="hidden">
                        <div class="bias-analysis-container">
                            <!-- Original Article Section -->
                            <div class="original-article">
                                <h3>Original Article</h3>
                                <div id="original-article-content"><!-- Filled by JS --></div>
                            </div>
                            <!-- AI Analysis Section -->
                            <div class="ai-analysis">
                                <h3>AI Bias Analysis</h3>
                                <div id="ai-analysis-content"><!-- Filled by JS --></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- jsPDF library for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- Export functionality modules -->
    <script src="js/file-generators.js"></script>
    <script src="js/export-modal.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui-utils.js"></script>
    <script src="js/bookmarks.js"></script>

    <!-- Global Spinner Overlay -->
    <div id="globalSpinner" class="global-spinner-overlay">
        <div class="spinner-future"></div>
    </div>
</body>
</html>
