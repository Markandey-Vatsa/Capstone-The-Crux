<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Taxonomy Pending Manager</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%2328455d'/%3E%3Ctext x='50%25' y='58%25' font-size='42' text-anchor='middle' fill='white'%3ET%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f7f9fc; }
        .card { box-shadow: 0 1px 3px rgba(15, 23, 42, 0.1); }
        .sticky-header { position: sticky; top: 0; background: #fff; }
        .suggestion-badge { font-size: 0.7rem; margin-right: 0.25rem; }
        .toast-container { z-index: 1060; }
        .workflow-card .form-label { font-weight: 600; }
        .min-width-6rem { min-width: 6rem; }
        .card-header-controls { gap: 0.5rem; }
        @media (max-width: 767.98px) {
            .card-header-controls { flex-direction: column; align-items: stretch; }
        }
        @media (max-width: 575.98px) {
            .card-header span { font-size: 0.95rem; }
        }
    </style>
</head>
<body>
<div class="container-xxl py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
            <h1 class="h3 mb-1">Taxonomy Pending Manager</h1>
            <p class="text-muted mb-0">Developer-only tooling for curating pending keywords.</p>
        </div>
        <div>
            <span class="badge bg-secondary" id="changesBadge">No unsaved changes</span>
        </div>
    </div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-xl-4 g-3 mb-3" id="summaryCards"></div>

    <div class="card mb-3 workflow-card">
        <div class="card-header bg-white fw-semibold">Workflow</div>
        <div class="card-body">
            <div class="row gy-3 gx-4 align-items-end">
                <div class="col-12 col-lg-4">
                    <label class="form-label">Choose Bucket</label>
                    <select id="bucketSelect" class="form-select"></select>
                    <div class="input-group input-group-sm mt-2">
                        <input id="newBucketInput" type="text" class="form-control" placeholder="New bucket name">
                        <button id="useNewBucketBtn" class="btn btn-outline-secondary">Use</button>
                    </div>
                </div>
                <div class="col-12 col-lg-4">
                    <label class="form-label">Actions</label>
                    <div class="d-flex flex-column flex-sm-row gap-2">
                        <button id="assignBtn" class="btn btn-primary flex-fill" data-loading-label="Assigning...">Assign Selected</button>
                        <button id="undoBtn" class="btn btn-warning flex-fill">Undo Last</button>
                    </div>
                </div>
                <div class="col-12 col-lg-4 text-lg-end">
                    <div class="d-flex flex-column flex-sm-row gap-2 justify-content-lg-end">
                        <button id="saveBtn" class="btn btn-success flex-fill" data-loading-label="Saving...">Save Changes</button>
                        <button id="reloadBtn" class="btn btn-outline-secondary flex-fill">Reload from Disk</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header bg-white fw-semibold">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                <span>Pending Keywords</span>
                <div class="d-flex card-header-controls flex-md-row align-items-md-center">
                    <div class="d-flex gap-2">
                        <input id="filterInput" type="search" class="form-control form-control-sm" placeholder="Filter keywords">
                        <button id="clearFilterBtn" class="btn btn-outline-secondary btn-sm">Clear</button>
                    </div>
                    <div class="d-flex align-items-center justify-content-end gap-2">
                        <button id="prevPageBtn" class="btn btn-outline-secondary btn-sm" title="Previous page">&laquo;</button>
                        <span id="pageIndicator" class="small text-muted min-width-6rem text-center"></span>
                        <button id="nextPageBtn" class="btn btn-outline-secondary btn-sm" title="Next page">&raquo;</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive" style="max-height: 70vh;">
                <table class="table table-sm table-hover align-middle mb-0" id="pendingTable">
                    <thead class="table-light sticky-header">
                        <tr>
                            <th style="width: 2.5rem;"><input type="checkbox" id="selectAll"></th>
                            <th style="width: 4rem;">#</th>
                            <th>Keyword</th>
                            <th style="width: 30%;">Suggested Buckets</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        <div class="card-footer bg-white small text-muted" id="pageSummary"></div>
    </div>
</div>

<div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/ui.js') }}"></script>
</body>
</html>
